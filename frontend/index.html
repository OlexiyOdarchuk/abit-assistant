<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Шанси на бюджет, реальні конкуренти та підбір програм для вступу в Україні." />
    <title>AbitAssistant — шанси на вступ</title>
    <script>
      // apply saved/system theme before paint (no flash)
      try {
        const t = localStorage.getItem('theme')
        if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches))
          document.documentElement.classList.add('dark')
      } catch (e) {}
    </script>
    <!-- Fonts bundled locally (with Cyrillic) — desktop works offline, no CDN. -->
    <link rel="stylesheet" href="/fonts/fonts.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
