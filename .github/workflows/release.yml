name: Release desktop builds

# Tag a release to build binaries for every OS and attach them to a GitHub
# Release:  git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.goos }}/${{ matrix.goarch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, goos: linux, goarch: amd64 }
          - { os: ubuntu-latest, goos: windows, goarch: amd64 }
          - { os: ubuntu-latest, goos: windows, goarch: arm64 }
          - { os: macos-latest, goos: darwin, goarch: amd64 }
          - { os: macos-latest, goos: darwin, goarch: arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Linux deps
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libglib2.0-dev upx-ucl

      - name: Windows deps (cross-compile from Linux)
        if: matrix.goos == 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis mingw-w64

      - name: macOS deps
        if: matrix.goos == 'darwin'
        run: brew install gcc || true

      - name: Build
        shell: bash
        run: |
          set -e
          out="AbitAssistant-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            wails build -platform windows/${{ matrix.goarch }} -clean -trimpath -ldflags "-s -w" -nsis
            cd build/bin
            [ -f AbitAssistant.exe ] && mv AbitAssistant.exe "${out}-portable.exe"
            for f in *installer.exe *-setup.exe; do [ -f "$f" ] && mv "$f" "${out}-setup.exe"; done || true
          elif [ "${{ matrix.goos }}" = "darwin" ]; then
            wails build -platform darwin/${{ matrix.goarch }} -clean -trimpath -ldflags "-s -w"
            cd build/bin
            app=$(ls -d *.app)
            mv "$app" "${out}.app"
            hdiutil create -volname AbitAssistant -srcfolder "${out}.app" -ov -format UDZO "${out}.dmg"
            rm -rf "${out}.app"
          else
            wails build -platform linux/${{ matrix.goarch }} -clean -trimpath -ldflags "-s -w" -tags webkit2_41
            cd build/bin
            mv AbitAssistant "${out}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AbitAssistant-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/bin/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: false
