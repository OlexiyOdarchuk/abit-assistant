# Local development stack: Postgres + the combined app (bot + web).
#   docker compose up -d          — run everything
#   docker compose logs -f app    — follow the app
#   TEST_DATABASE_URL=postgres://abit:abit@localhost:5432/abit?sslmode=disable go test ./...
#
# Production deploys the single Dockerfile (cmd/app = bot + web) against a
# managed Postgres — this compose is only for local dev.

services:
  postgres:
    image: postgres:16-alpine
    container_name: abit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: abit
      POSTGRES_PASSWORD: abit
      POSTGRES_DB: abit
    ports:
      - "5432:5432" # exposed so `go test` (TEST_DATABASE_URL) can reach it
    volumes:
      # A named volume, NOT a repo-tree bind mount: container-owned files under
      # ./data/postgres (mode 700) broke every `go`/wails command that walks the
      # module (pattern `all`). Postgres is server-only anyway — irrelevant to
      # the desktop build. `docker compose down -v` wipes it.
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abit -d abit"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: "3.0-compose"
    image: abit-assistant:local
    container_name: abit-app
    restart: unless-stopped
    env_file:
      - .env # TELEGRAM_TOKEN, ADMIN_IDS
    environment:
      DATABASE_URL: postgres://abit:abit@postgres:5432/abit?sslmode=disable
      HTTP_ADDR: ":8080"
      # Enables the browser fallback for osvita's Turnstile-gated applicant API.
      # Unset → the app runs exactly as before (challenged programs just fail).
      OSVITA_BROWSER_URL: http://chromium:9222
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      chromium:
        condition: service_started
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 384M

  # Chromium sidecar — clears osvita's Cloudflare Turnstile challenge for the
  # applicant API (the app image stays `scratch`; the browser never lives in
  # it). The Go app reaches it over CDP at OSVITA_BROWSER_URL.
  #
  # ⚠️  DETECTION: a plain HEADLESS Chromium is fingerprinted and BLOCKED by
  # Turnstile — the widget loads but never issues a token (verified against the
  # live site: getResponse() stays empty). A real *headed* Chrome solves the
  # managed challenge instantly. So for this to actually work the sidecar must
  # run the browser HEADFUL under a virtual display (Xvfb), or use a
  # stealth-configured image (e.g. browserless/chromium). The alpine-chrome
  # config below is a lean, reachable STARTING POINT for wiring/e2e — swap in a
  # headful/stealth browser before relying on it in production.
  # Pin the tag for reproducible builds; `latest` is used here for convenience.
  chromium:
    image: zenika/alpine-chrome:latest
    container_name: abit-chromium
    restart: unless-stopped
    # Entrypoint is chromium-browser; these args make it a remote DevTools host.
    #   --remote-debugging-address=0.0.0.0 — reachable from the app container
    #     (NOTE: --headless=new ignores this and binds loopback-only; use plain
    #      --headless, or run headful under Xvfb, for a network-reachable port)
    #   --remote-allow-origins=*           — newer Chromium rejects CDP otherwise
    #   --disable-dev-shm-usage            — survive the small default /dev/shm
    command:
      - --headless
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --remote-allow-origins=*
      - about:blank
    # Chrome is memory-hungry and needs real shared memory for page rendering.
    shm_size: 512m
    expose:
      - "9222" # internal only — not published to the host
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9222/json/version"]
      interval: 10s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G

# Named volume for Postgres data — kept OUT of the repo tree (see the app
# service comment). `docker volume rm abitassistant_pgdata` to reset.
volumes:
  pgdata:
