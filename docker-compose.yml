# Local development stack: Postgres + bot + web.
#   docker compose up -d          — run everything
#   docker compose logs -f bot    — follow a service
#   TEST_DATABASE_URL=postgres://abit:abit@localhost:5432/abit?sslmode=disable go test ./...
#
# Production is deployed elsewhere as two Dockerfiles (Dockerfile,
# Dockerfile.web) against a managed Postgres — this compose is only for dev.

services:
  postgres:
    image: postgres:16-alpine
    container_name: abit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: abit
      POSTGRES_PASSWORD: abit
      POSTGRES_DB: abit
    ports:
      - "5432:5432" # exposed so `go test` (TEST_DATABASE_URL) can reach it
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abit -d abit"]
      interval: 5s
      timeout: 3s
      retries: 10

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: "3.0-compose"
    image: abit-assistant-bot:local
    container_name: abit-bot
    restart: unless-stopped
    env_file:
      - .env # TELEGRAM_TOKEN, ADMIN_IDS
    environment:
      DATABASE_URL: postgres://abit:abit@postgres:5432/abit?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VERSION: "3.0-compose"
    image: abit-assistant-web:local
    container_name: abit-web
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://abit:abit@postgres:5432/abit?sslmode=disable
      HTTP_ADDR: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
